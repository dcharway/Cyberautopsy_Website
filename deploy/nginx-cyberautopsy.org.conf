# /etc/nginx/sites-available/cyberautopsy.org
#
# Marketing site at the apex domain. After `certbot --nginx -d cyberautopsy.org -d www.cyberautopsy.org`
# runs, it will add the SSL cert paths and the HTTP→HTTPS redirect block automatically.
#
# Reload after edits:  sudo nginx -t && sudo systemctl reload nginx

# Trust X-Forwarded-* headers from this proxy
proxy_set_header X-Real-IP        $remote_addr;
proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header Host             $host;

# Allow long requests for report generation (zip + xlsx bundling)
proxy_read_timeout    60s;
proxy_send_timeout    60s;
proxy_connect_timeout 30s;

server {
    listen 80;
    listen [::]:80;
    server_name cyberautopsy.org www.cyberautopsy.org;

    # Redirect www → apex
    if ($host = www.cyberautopsy.org) {
        return 301 https://cyberautopsy.org$request_uri;
    }

    # Security headers (also applied on HTTPS after certbot edits)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS — only meaningful after certbot adds 443; harmless on 80
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Body size — required for evidence uploads (raise as needed)
    client_max_body_size 25M;

    # Static Next.js assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Hero video and other public assets — cache 1 day
    location ~* \.(mp4|webm|jpg|jpeg|png|gif|ico|svg|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else — reverse-proxy to the Next.js dev/production server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
