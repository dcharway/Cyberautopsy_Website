# /etc/nginx/sites-available/cyberautopsy.org
#
# Marketing site. Three logical hostnames:
#   - www.cyberautopsy.org   → canonical, serves the marketing app
#   - cyberautopsy.org       → apex, 301-redirects to https://www. (canonical)
#   - (HTTP 80 for both)     → certbot adds a redirect to HTTPS
#
# Initial cert issuance / re-issuance covering ALL THREE hostnames:
#
#   sudo bash deploy/ssl-expand.sh
#
# Reload after manual edits:  sudo nginx -t && sudo systemctl reload nginx

# Allow long requests for report generation (zip + xlsx bundling)
proxy_read_timeout    60s;
proxy_send_timeout    60s;
proxy_connect_timeout 30s;

# ---------------------------------------------------------------------------
# Port 80 — both names. Certbot adds an HTTPS redirect block on top of this
# after `certbot --nginx ... --redirect` runs.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name www.cyberautopsy.org cyberautopsy.org;

    # Security headers (also applied on HTTPS after certbot edits)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 25M;

    # Static Next.js assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;

        # Forwarded headers — MUST be set in each location because Nginx does
        # NOT inherit parent-level proxy_set_header once a child sets any.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Hero video and other public assets — cache 1 day
    location ~* \.(mp4|webm|jpg|jpeg|png|gif|ico|svg|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Critical: Next.js needs Host = the public hostname to issue correct
        # redirect URLs (forgot-password reset links, OAuth callback origin,
        # WebAuthn RP_ID consistency).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HMR support (dev only; harmless in prod)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# ---------------------------------------------------------------------------
# Port 443 — apex 301-redirects to https://www. (canonicalisation).
#
# The cert is the Let's Encrypt cert installed by ssl-expand.sh, which
# includes www.cyberautopsy.org + cyberautopsy.org + portal.cyberautopsy.org
# in its SAN list. The path below uses the www. lineage because certbot keys
# the cert directory off the first -d argument passed at issuance.
#
# If you ever bootstrap a new cert with a different first -d, update the
# ssl_certificate paths here to match /etc/letsencrypt/live/<that-name>/.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cyberautopsy.org;

    ssl_certificate     /etc/letsencrypt/live/www.cyberautopsy.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cyberautopsy.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Preserve the path + query when redirecting so deep links keep working.
    return 301 https://www.cyberautopsy.org$request_uri;
}

# ---------------------------------------------------------------------------
# Port 443 — canonical hostname. Certbot manages the listen / ssl_certificate
# lines for THIS block automatically; the proxy / header config below is the
# part we own.
#
# Sample of what the certbot-managed block looks like after `ssl-expand.sh`
# runs:
#
#   server {
#       server_name www.cyberautopsy.org;
#       listen 443 ssl http2;
#       listen [::]:443 ssl http2;
#       ssl_certificate     /etc/letsencrypt/live/www.cyberautopsy.org/fullchain.pem;
#       ssl_certificate_key /etc/letsencrypt/live/www.cyberautopsy.org/privkey.pem;
#       include /etc/letsencrypt/options-ssl-nginx.conf;
#       ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#       # ... all the location {} blocks from the port 80 server above ...
#   }
#
# DO NOT add `cyberautopsy.org` to that server_name — the apex must hit the
# 301-redirect block above, not the app server.
# ---------------------------------------------------------------------------
